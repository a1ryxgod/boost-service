services:
  db:
    image: postgres:15-alpine
    container_name: boost-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-admin}
      POSTGRES_DB: ${DB_NAME:-boost_service}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./BackEnd
    container_name: boost-backend
    restart: always
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-admin}
      - DB_NAME=${DB_NAME:-boost_service}
      - PORT=4001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-in-production}
    ports:
      - "4001:4001"

  frontend:
    build:
      context: ./FrontEnd
    container_name: boost-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4001/api/v1}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
